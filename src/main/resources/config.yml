# AdvancementPlus
# Paper 26.1.2+ / Java 25
config-version: 5

gamerule:
  # Set showAdvancementMessages=false in every loaded world, and in worlds loaded later.
  # This is the Paper 26.1+ gamerule name for old announceAdvancements behavior.
  auto-disable-announce-advancements: true

  # Also null the Paper advancement completion event message so vanilla chat output
  # cannot leak through if a world gamerule is changed back on.
  suppress-vanilla-event-message: true

broadcast:
  # Options: all, world, permission, self
  audience: "all"

  # Used when audience is permission.
  permission: "advancementplus.see"

  # Mirror formatted messages to the console.
  console: true

filter:
  # Supports exact values and simple wildcards.
  # Examples: "*", "minecraft", "datapack_namespace"
  include-namespaces:
    - "*"
  exclude-namespaces: []

  # Supports namespace:path exact values and simple wildcards.
  # Examples: "*", "minecraft:nether/*", "custom:quests/*"
  include-advancements:
    - "*"
  exclude-advancements:
    - "minecraft:recipes/*"

visibility:
  # Hidden advancements such as secret challenges still have display data and can be announced.
  include-hidden: true

  # No-display advancements include recipes and fully hidden technical advancements.
  # Leave false unless you really want every backing advancement event.
  include-no-display: false

  # Root tab advancements are often granted passively and vanilla usually does not chat-announce them.
  include-root-advancements: false

  # If true, only advancements whose display says announce_to_chat=true are completed.
  # Progress messages still obey the other filters.
  require-display-announces-to-chat-for-completion: false

progress:
  enabled: true

  # Avoid progress spam for one-criterion advancements; their completion message is enough.
  announce-single-criterion: false

  # If false, the criterion that completes the advancement only emits the completion message.
  announce-final-criterion: false

  # Per player+advancement progress cooldown. Set 0 to show every granted criterion.
  cooldown-millis: 500

completion:
  enabled: true
  cooldown-millis: 0

rewards:
  # Reward commands are intentionally disabled by default. Treat them as
  # explicit quest rewards, not automatic money for every advancement toast.
  enabled: false

  # Store paid rewards in reward-history.yml so a completion cannot be paid
  # again after reloads, duplicate events, or temporary config changes.
  first-time-only: true

  # If false, an exact advancement reward overrides the frame default reward.
  # If true, exact rewards and matching task/goal/challenge defaults both run.
  stack-frame-defaults: false

  # Logs each dispatched reward command to the console.
  log-executions: true

  # Empty list allows every gamemode. Recommended public defaults avoid paying
  # rewards while players are in creative or spectator.
  allowed-game-modes:
    - "SURVIVAL"

  # Empty allowed-worlds means every world is allowed. blocked-worlds always wins.
  # Supports exact values and simple wildcards.
  allowed-worlds: []
  blocked-worlds: []

  # required-permissions: if non-empty, the player must have at least one.
  # excluded-permissions: if the player has any listed permission, rewards are skipped.
  required-permissions: []
  excluded-permissions:
    - "advancementplus.reward.exempt"

  # Reward filters are separate from broadcast filters.
  include-namespaces:
    - "*"
  exclude-namespaces: []
  include-advancements:
    - "*"
  exclude-advancements:
    - "minecraft:recipes/*"
    - "minecraft:story/root"
    - "minecraft:nether/root"
    - "minecraft:end/root"
    - "minecraft:adventure/root"
    - "minecraft:husbandry/root"

  visibility:
    include-hidden: true
    include-no-display: false
    include-root-advancements: false
    require-display-announces-to-chat: false

  # Frame defaults are broad and should stay empty unless your economy is tuned
  # for one-time rewards across many advancements.
  frame-defaults:
    task:
      commands: []
    goal:
      commands: []
    challenge:
      commands: []
    no-display:
      commands: []

  # Exact advancement rewards are the recommended path. Commands run as console.
  # Available placeholders:
  # <player>, <uuid>, <world>, <key>, <namespace>, <path>, <frame>, <criterion>,
  # <completed>, <total>, <remaining>, <percent>, <x>, <y>, <z>
  advancements:
    # minecraft:end/kill_dragon:
    #   commands:
    #     - "eco give <player> 5000"
    # minecraft:nether/summon_wither:
    #   commands:
    #     - "eco give <player> 3000"

  milestones:
    # Milestones use the same global reward gates above, including enabled,
    # first-time-only, worlds, gamemodes, and permissions.
    enabled: true

    # Milestone progress is evaluated from loaded advancements at runtime.
    # Default scope is vanilla visible non-root advancements, excluding recipes.
    selection:
      include-namespaces:
        - "minecraft"
      exclude-namespaces: []
      include-advancements:
        - "*"
      exclude-advancements:
        - "minecraft:recipes/*"
        - "minecraft:story/root"
        - "minecraft:nether/root"
        - "minecraft:end/root"
        - "minecraft:adventure/root"
        - "minecraft:husbandry/root"
      visibility:
        include-hidden: true
        include-no-display: false
        include-root-advancements: false
        require-display-announces-to-chat: false

    # Count rewards are a safer alternative to paying every easy advancement.
    # Keys are completed advancement thresholds in the milestone selection.
    completed-counts:
      # 10:
      #   commands:
      #     - "eco give <player> 250"
      # 25:
      #   commands:
      #     - "eco give <player> 1000"

    # Frame count rewards are good for challenge-heavy progression.
    frame-counts:
      task: {}
      goal: {}
      challenge:
        # 5:
        #   commands:
        #     - "crate key give <player> advancement 1"

    # Root keys represent vanilla tabs. These reward full tab completion.
    tab-completions:
      # minecraft:nether/root:
      #   commands:
      #     - "eco give <player> 7500"
      # minecraft:end/root:
      #   commands:
      #     - "eco give <player> 10000"
      # minecraft:adventure/root:
      #   commands:
      #     - "lp user <player> permission set sqware.title.adventurer true"
      # minecraft:husbandry/root:
      #   commands:
      #     - "lp user <player> permission set sqware.title.naturalist true"

    # Rewards for completing every selected advancement, or every selected
    # advancement of a frame type. Best used for prestige cosmetics.
    all-selected:
      commands: []
    all-frames:
      task:
        commands: []
      goal:
        commands: []
      challenge:
        commands: []

    # Custom milestone groups let servers define achievement arcs without
    # pricing every advancement individually. required-count: 0 means all.
    groups:
      # trial-chambers:
      #   include-advancements:
      #     - "minecraft:adventure/minecraft_trials_edition"
      #     - "minecraft:adventure/under_lock_and_key"
      #     - "minecraft:adventure/revaulting"
      #     - "minecraft:adventure/blowback"
      #     - "minecraft:adventure/who_needs_rockets"
      #     - "minecraft:adventure/overoverkill"
      #   required-count: 0
      #   commands:
      #     - "crate key give <player> trial 1"

format:
  # Options: minimessage, legacy
  engine: "minimessage"

  # Message placeholders:
  # <player>, <display_name>, <world>, <title>, <description>, <key>, <namespace>, <path>
  # <frame>, <frame_title>, <criterion>, <completed>, <total>, <remaining>, <percent>, <bar>
  # Progress counts use satisfied advancement requirement groups, which handles OR-style criteria correctly.
  progress-template: "<#2b98fd>AdvancementPlus</#2b98fd> <dark_gray>›</dark_gray> <white><player></white> <gray>progressed</gray> <#8ecbff><title></#8ecbff> <dark_gray>(<completed>/<total> <#2b98fd><bar></#2b98fd>)</dark_gray>"
  no-display-progress-template: "<#2b98fd>AdvancementPlus</#2b98fd> <dark_gray>›</dark_gray> <white><player></white> <gray>progressed</gray> <#8ecbff><key></#8ecbff> <dark_gray>(<completed>/<total>)</dark_gray>"

  completion-templates:
    task: "<#2b98fd>AdvancementPlus</#2b98fd> <dark_gray>›</dark_gray> <white><player></white> <gray>made advancement</gray> <#8ecbff><title></#8ecbff>"
    goal: "<#2b98fd>AdvancementPlus</#2b98fd> <dark_gray>›</dark_gray> <white><player></white> <gray>reached goal</gray> <#8ecbff><title></#8ecbff>"
    challenge: "<#2b98fd>AdvancementPlus</#2b98fd> <dark_gray>›</dark_gray> <white><player></white> <gray>completed challenge</gray> <#8ecbff><title></#8ecbff>"
    no-display: "<#2b98fd>AdvancementPlus</#2b98fd> <dark_gray>›</dark_gray> <white><player></white> <gray>completed</gray> <#8ecbff><key></#8ecbff>"

  hover:
    enabled: true
    template: "<#8ecbff><title></#8ecbff><newline><gray><description></gray><newline><dark_gray><key></dark_gray><newline><gray>Progress: <white><completed>/<total></white> <dark_gray>(<#2b98fd><percent>%</#2b98fd>)</dark_gray></gray><newline><gray>Criterion: <white><criterion></white></gray>"

  progress-bar:
    width: 12
    filled: "#"
    empty: "-"

sound:
  progress:
    enabled: false
    key: "entity.experience_orb.pickup"
    category: "master"
    volume: 0.35
    pitch: 1.4
  completion:
    task:
      enabled: false
      key: "ui.toast.in"
      category: "master"
      volume: 0.7
      pitch: 1.0
    goal:
      enabled: false
      key: "ui.toast.in"
      category: "master"
      volume: 0.8
      pitch: 1.1
    challenge:
      enabled: false
      key: "ui.toast.challenge_complete"
      category: "master"
      volume: 0.9
      pitch: 1.0
    no-display:
      enabled: false
      key: "ui.toast.in"
      category: "master"
      volume: 0.6
      pitch: 1.0
